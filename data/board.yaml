board_minutes:
  - meeting_id: bm-2025-06-15
    seq: 1
    item_text: Meeting called to order at 10:00. Quorum confirmed.
  - meeting_id: bm-2025-06-15
    seq: 2
    item_text: Reviewed and approved Articles of Association as drafted by solicitors.
  - meeting_id: bm-2025-06-15
    seq: 3
    item_text: Appointed Richard Targett as sole director. Mark Holland appointed company secretary.
  - meeting_id: bm-2025-06-15
    seq: 4
    item_text: Authorised 10,000 ordinary shares at £0.01 nominal value. Initial grant of 1,000 shares to Richard Targett.
  - meeting_id: bm-2025-06-15
    seq: 5
    item_text: Resolved to open business account with Tide. Richard authorised as sole signatory.
  - meeting_id: bm-2025-06-15
    seq: 6
    item_text: Meeting adjourned at 11:15.

  - meeting_id: bm-2025-09-20
    seq: 1
    item_text: Meeting called to order at 14:00 via Google Meet.
  - meeting_id: bm-2025-09-20
    seq: 2
    item_text: Reviewed bank balance of £4,200. Noted hosting costs running at £85/month.
  - meeting_id: bm-2025-09-20
    seq: 3
    item_text: Discussed product roadmap. Agreed to prioritise company-as-code tooling over consulting pipeline.
  - meeting_id: bm-2025-09-20
    seq: 4
    item_text: Emma Loxley presented early design work. Board agreed to formalise her involvement.
  - meeting_id: bm-2025-09-20
    seq: 5
    item_text: Meeting adjourned at 15:30.

  - meeting_id: bm-2025-12-10
    seq: 1
    item_text: Meeting called to order at 10:00. Quorum confirmed.
  - meeting_id: bm-2025-12-10
    seq: 2
    item_text: Reviewed year-end financials. Total revenue £12,400, expenses £8,900, net position £3,500.
  - meeting_id: bm-2025-12-10
    seq: 3
    item_text: Approved share transfers — 10 shares to Mark Holland, 69 shares to Emma Loxley — recognising contributions.
  - meeting_id: bm-2025-12-10
    seq: 4
    item_text: Approved additional grant of 7,079 shares to Richard Targett to fill founder pool allocation.
  - meeting_id: bm-2025-12-10
    seq: 5
    item_text: Discussed 2026 goals — target first paying customer by Q2, explore pre-seed fundraising.
  - meeting_id: bm-2025-12-10
    seq: 6
    item_text: Appointed Emma Loxley as director, effective immediately.
  - meeting_id: bm-2025-12-10
    seq: 7
    item_text: Meeting adjourned at 12:45.

